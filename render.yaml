services:
  - type: web
    name: military-asset-management
    env: node
    plan: free
    buildCommand: "npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    healthCheckPath: /health
