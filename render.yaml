services:
  - type: web
    name: military-asset-management
    env: node
    plan: free
    buildCommand: "cd military-asset-management/military-asset-management && npm install && npm run build && cd ../../military-asset-management/backend && npm install"
    startCommand: "cd military-asset-management/backend && node index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    healthCheckPath: /health
